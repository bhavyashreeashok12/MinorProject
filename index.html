<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreyAtom Logistics - Internal Dashboard</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="heading">
        <img src="./logo.png" alt="GreyAtom Logo">
        <div>
            <h1>GreyAtom</h1>
            <h3>Logistics Pvt. Ltd.</h3>
        </div>
        <ul id="nav">
            <li class="items">Delivery Exception Form</li>
            <li class="items">Reported Exceptions</li>
            <li class="support">For Help: greyatomsupport@gmail.com</li>
        </ul>
    </div>

    <div class="head" id="formhead">
        <h2>Delivery Exception Form</h2>
        <h3>Open Exceptions:</h3><h4 id="count1">0</h4>
        <h3>Resolved Exceptions:</h3><h4 id="count2">0</h4>
    </div>

    <div class="container">
        <form id="Myform">
            <div class="form-group">
                <label for="delID">Delivery ID</label>
                <input type="text" id="delID" name="delID" placeholder="Enter the Delivery ID" required>
            </div>

            <div class="form-group">
                <label for="cust">Customer Name</label>
                <input type="text" id="cust" name="cust" placeholder="Enter the Customer Name" required>
            </div>

            <div class="form-group">
                <label for="issuetype">Issue Type</label>
                <select id="issuetype" name="issuetype" required>
                    <option value="" disabled selected>Select the Issue Type</option>
                    <option value="Address Not Found">Address Not Found</option>
                    <option value="Customer Not Available">Customer Not Available</option>
                    <option value="Payment Issue">Payment Issue</option>
                    <option value="Package Damaged">Package Damaged</option>
                </select>
            </div>

            <div class="form-group">
                <label class="section-label">Select Priority</label>
                <div class="radio-group">
                    <label><input type="radio" name="priority" value="Low" required> Low</label>
                    <label><input type="radio" name="priority" value="Medium" required> Medium</label>
                    <label><input type="radio" name="priority" value="High" required> High</label>
                </div>
            </div>

            <div class="form-group">
                <label for="comments">Additional Comments (Optional)</label>
                <textarea id="comments" placeholder="Add details about the exception..."></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Submit Exception</button>
        </form>
    </div>

    <div class="head">
        <h2>Exceptions Dashboard</h2>

        <div class="filter">
                <label for="issuetype1">Filter by Issue Type</label>
                <select id="issuetype1" name="issuetype1" required>
                    <option value="All">All</option>
                    <option value="Address Not Found">Address Not Found</option>
                    <option value="Customer Not Available">Customer Not Available</option>
                    <option value="Payment Issue">Payment Issue</option>
                    <option value="Package Damaged">Package Damaged</option>
                </select>
        </div>

        <div class="filter">
                <label for="Status">Filter by Status</label>
                <select id="Status" name="Status" required>
                    <option value="All">All</option>
                    <option value="Open">Open</option>
                    <option value="Resolved">Resolved</option>
                </select>
            </div>

    </div>

    <table border="1" id="Mytable">
        <tr>
        <th>Delivery ID</th>
        <th>Customer Name</th>
        <th>Issue Type</th>
        <th>Priority</th>
        <th>Status</th>
        <th colspan="2">Actions</th>
        </tr>
    </table>
    <script src="./script.js"></script>
</body>
</html>
